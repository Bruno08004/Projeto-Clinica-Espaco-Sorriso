<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pacientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">
    <img src="../assests/logo.png" alt="Espaço Sorriso">
  </div>

  <h1>Espaço Sorriso - Sistema de Gestão</h1>

  <nav>
    <a href="#">Início</a>
    <a href="#">Relatórios</a>
    <a href="#">Configurações</a>
    <a href="#">Sair</a>
  </nav>

  <div class="profile">👤</div>
</header>

<main class="container">

  <!-- TÍTULO -->
  <div class="title">
    <h2>Gerenciamento de Pacientes</h2>
    <p>Cadastre, edite e consulte informações básicas dos pacientes.</p>
  </div>

  <!-- BUSCA -->
  <div class="search-bar">
    <input type="text" placeholder="Buscar por nome, CPF ou telefone...">
    <button>Pesquisar</button>
  </div>

  <div class="content">

    <!-- TABELA -->
    <div class="table-box">

      <button class="btn-new">Novo Paciente</button>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>Endereço</th>
            <th>Data de Nascimento</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Maria Silva</td>
            <td>123.456.789-00</td>
            <td>(11) 99999-9999</td>
            <td>Rua Exemplo, 123</td>
            <td>01/01/2000</td>
            <td>
              <button class="edit">Editar</button>
              <button class="delete">Excluir</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- FORMULÁRIO -->
    <div class="form-box">

      <div class="tabs">
        <button class="active">Cadastrar Paciente</button>
        <button>Editar Paciente</button>
      </div>

      <form>
        <input placeholder="Nome*">
        <input placeholder="CPF*">
        <input placeholder="Telefone*">
        <input placeholder="Endereço*">
        <input placeholder="Data de Nascimento">

        <button class="save">Salvar</button>
      </form>

    </div>

  </div>

</main>

<footer class="footer">
  <span>SAIR</span>
</footer>

</body>
</html>
