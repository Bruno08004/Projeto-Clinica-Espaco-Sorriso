<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Procedimentos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../global.css">
</head>
<body>
<header class="topbar">
  <div class="logo">
    <img src="../../assests/logo.png" alt="Espaço Sorriso">
  </div>
  <h1>Espaço Sorriso - Sistema de Gestão</h1>
  <nav>
    <a href="javascript:irParaInicio()">Início</a>
    <a href="#">Relatórios</a>
    <a href="#">Configurações</a>
    <a href="javascript:sair()">Sair</a>
  </nav>
  <div class="profile">👤</div>
</header>

<main class="container">
  <div class="title">
    <h2>Gerenciamento de Procedimentos</h2>
    <p>Cadastre e classifique procedimentos odontológicos por tipo de atendimento.</p>
  </div>

  <div class="search-bar">
    <input id="busca-input" type="text" placeholder="Buscar por nome, tipo ou descrição...">
    <button id="busca-btn">Pesquisar</button>
  </div>

  <div class="content">
    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Descrição</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="form-box">
      <div class="tabs">
        <button class="active" type="button">Cadastrar Procedimento</button>
        <button type="button">Editar Procedimento</button>
      </div>

      <form id="form-procedimento">
        <input id="nome" placeholder="Nome do procedimento*">
        <select id="tipoProcedimento">
          <option value="">Selecione o tipo*</option>
          <option value="CLÍNICO">CLÍNICO</option>
          <option value="ORTODÔNTICO">ORTODÔNTICO</option>
        </select>
        <textarea id="descricao" placeholder="Descrição"></textarea>

        <button type="submit" class="save">Salvar</button>
      </form>
    </div>
  </div>
</main>

<footer class="footer">
  <button onclick="sair()">SAIR</button>
</footer>

<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-message" id="modal-message"></div>
    <div class="modal-buttons" id="modal-buttons"></div>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:3000/procedimentos';
  const tbody = document.querySelector('table tbody');
  const formProcedimento = document.getElementById('form-procedimento');
  let idEmEdicao = null;
  let procedimentosCache = [];

  function showModal(title, message, type = 'info', buttons = []) {
    const modal = document.getElementById('modal');
    const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ', confirm: '?' };
    document.getElementById('modal-icon').textContent = icons[type] || icons.info;
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-message').textContent = message;
    const buttonsEl = document.getElementById('modal-buttons');
    buttonsEl.innerHTML = '';
    buttons.forEach(btn => {
      const button = document.createElement('button');
      button.className = 'modal-btn ' + (btn.className || 'modal-btn-secondary');
      button.textContent = btn.text;
      button.onclick = () => {
        btn.action();
        modal.classList.remove('active');
      };
      buttonsEl.appendChild(button);
    });
    modal.className = 'modal-overlay active modal-' + type;
    modal.onclick = event => {
      if (event.target === modal) modal.classList.remove('active');
    };
  }

  function showAlert(title, message, type = 'info') {
    showModal(title, message, type, [{ text: 'OK', className: 'modal-btn-primary', action: () => {} }]);
  }

  function showConfirm(title, message, onConfirm) {
    showModal(title, message, 'confirm', [
      { text: 'Cancelar', className: 'modal-btn-secondary', action: () => {} },
      { text: 'Confirmar', className: 'modal-btn-danger', action: onConfirm }
    ]);
  }

  function renderizarProcedimentos(procedimentos) {
    tbody.innerHTML = '';
    if (!procedimentos.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Procedimento não encontrado</td></tr>';
      return;
    }

    procedimentos.forEach(procedimento => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${procedimento.idProcedimento || '-'}</td>
        <td>${procedimento.nome || '-'}</td>
        <td>${procedimento.tipoProcedimento || '-'}</td>
        <td>${procedimento.descricao || '-'}</td>
        <td>
          <button class="edit" data-id="${procedimento.idProcedimento}">Editar</button>
          <button class="delete" data-id="${procedimento.idProcedimento}">Excluir</button>
        </td>
      `;
      tbody.appendChild(tr);
      tr.querySelector('.edit').addEventListener('click', () => editarProcedimento(procedimento));
      tr.querySelector('.delete').addEventListener('click', () => excluirProcedimento(procedimento.idProcedimento));
    });
  }

  async function carregarProcedimentos() {
    try {
      const resposta = await fetch(API_URL);
      procedimentosCache = await resposta.json();
      renderizarProcedimentos(procedimentosCache);
    } catch (erro) {
      console.error('Erro ao carregar procedimentos:', erro);
      renderizarProcedimentos([]);
      showAlert('Erro', 'Erro ao carregar procedimentos. Verifique se a rota /procedimentos está ativa.', 'error');
    }
  }

  function editarProcedimento(procedimento) {
    idEmEdicao = procedimento.idProcedimento;
    document.getElementById('nome').value = procedimento.nome || '';
    document.getElementById('tipoProcedimento').value = procedimento.tipoProcedimento || '';
    document.getElementById('descricao').value = procedimento.descricao || '';
    document.querySelector('.save').textContent = 'Atualizar';
    document.querySelectorAll('.tabs button')[0].classList.remove('active');
    document.querySelectorAll('.tabs button')[1].classList.add('active');
    document.querySelector('.form-box').scrollIntoView({ behavior: 'smooth' });
  }

  async function excluirProcedimento(id) {
    showConfirm('Excluir Procedimento', 'Tem certeza que deseja excluir este procedimento?', async () => {
      try {
        const resposta = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        const resultado = await resposta.json();
        if (resposta.ok) {
          showAlert('Sucesso!', resultado.mensagem || 'Procedimento excluído com sucesso.', 'success');
          carregarProcedimentos();
        } else {
          showAlert('Aviso', resultado.erro || 'Não foi possível excluir o procedimento.', 'warning');
        }
      } catch (erro) {
        console.error(erro);
        showAlert('Erro', 'Erro ao excluir procedimento.', 'error');
      }
    });
  }

  formProcedimento.addEventListener('submit', async evento => {
    evento.preventDefault();
    const dados = {
      nome: document.getElementById('nome').value.trim(),
      tipoProcedimento: document.getElementById('tipoProcedimento').value,
      descricao: document.getElementById('descricao').value.trim() || null
    };

    if (!dados.nome || !dados.tipoProcedimento) {
      showAlert('Aviso', 'Preencha nome e tipo do procedimento.', 'warning');
      return;
    }

    try {
      const resposta = await fetch(idEmEdicao ? `${API_URL}/${idEmEdicao}` : API_URL, {
        method: idEmEdicao ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dados)
      });
      const resultado = await resposta.json();
      if (resposta.ok) {
        showAlert('Sucesso!', resultado.mensagem || 'Procedimento salvo com sucesso.', 'success');
        limparFormulario();
        carregarProcedimentos();
      } else {
        showAlert('Aviso', resultado.erro || 'Não foi possível salvar o procedimento.', 'warning');
      }
    } catch (erro) {
      console.error(erro);
      showAlert('Erro', 'O backend não respondeu.', 'error');
    }
  });

  function limparFormulario() {
    formProcedimento.reset();
    idEmEdicao = null;
    document.querySelector('.save').textContent = 'Salvar';
    document.querySelectorAll('.tabs button')[0].classList.add('active');
    document.querySelectorAll('.tabs button')[1].classList.remove('active');
  }

  document.querySelectorAll('.tabs button')[0].addEventListener('click', limparFormulario);

  document.getElementById('busca-btn').addEventListener('click', () => {
    const termo = document.getElementById('busca-input').value.trim().toLowerCase();
    if (!termo) {
      showAlert('Campo vazio', 'Digite algo para buscar.', 'warning');
      return;
    }
    const encontrados = procedimentosCache.filter(procedimento =>
      (procedimento.nome || '').toLowerCase().includes(termo) ||
      (procedimento.tipoProcedimento || '').toLowerCase().includes(termo) ||
      (procedimento.descricao || '').toLowerCase().includes(termo)
    );
    renderizarProcedimentos(encontrados);
  });

  document.getElementById('busca-input').addEventListener('keypress', event => {
    if (event.key === 'Enter') document.getElementById('busca-btn').click();
  });

  const botaoLimparBusca = document.createElement('button');
  botaoLimparBusca.textContent = 'Limpar Busca';
  botaoLimparBusca.style.marginLeft = '10px';
  botaoLimparBusca.addEventListener('click', () => {
    document.getElementById('busca-input').value = '';
    renderizarProcedimentos(procedimentosCache);
  });
  document.querySelector('.search-bar').appendChild(botaoLimparBusca);

  function irParaInicio() {
    window.location.href = '../../Tela/index.html';
  }

  function sair() {
    showConfirm('Sair do Sistema', 'Tem certeza que deseja sair?', () => {
      window.location.href = '../../Tela/index.html';
    });
  }

  carregarProcedimentos();
</script>
</body>
</html>
