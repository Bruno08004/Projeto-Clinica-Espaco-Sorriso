<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dentistas</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../global.css">
</head>
<body>

<header class="topbar">
  <div class="logo">
    <img src="../../assests/logo.png" alt="Espaço Sorriso">
  </div>

  <h1>Espaço Sorriso - Sistema de Gestão</h1>

  <nav>
    <a href="javascript:irParaInicio()">Início</a>
    <a href="#">Relatórios</a>
    <a href="#">Configurações</a>
    <a href="javascript:sair()">Sair</a>
  </nav>

  <div class="profile">👤</div>
</header>


<main class="container">

  <!-- TÍTULO -->
  <div class="title">
    <h2>Gerenciamento de Dentistas</h2>
    <p>Cadastre dentistas e gere relatórios de produtividade.</p>
  </div>

  <!-- BUSCA -->
  <div class="search-bar">
    <input id="busca-input" type="text" placeholder="Buscar por nome do dentista, CRO, telefone ou especialidade...">
    <button id="busca-btn">Pesquisar</button>
  </div>

  <div class="content">

    <!-- TABELA -->
    <div class="table-box">

      <table>
        <thead>
          <tr>
            <th>Nome do Dentista</th>
            <th>CRO</th>
            <th>Especialidade</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Dr. Ricardo Almeida</td>
            <td>SP-12345</td>
            <td>Ortodontia</td>
            <td>---</td>
            <td>---</td>
            <td>
              <button class="edit">Editar</button>
              <button class="delete">Excluir</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- FORMULÁRIO -->
    <div class="form-box">

      <div class="tabs">
        <button class="active">Cadastrar Dentista</button>
        <button>Editar Dentista</button>
      </div>

      <form id="form-dentista">
        <input id="nome" placeholder="Nome*">
        <input id="cro" placeholder="CRO (apenas números)*">
        <input id="uf" placeholder="UF do CRO (ex: BA, SP)*">
        <select id="especialidade">
          <option value="">Selecione a especialidade*</option>
          <option value="CLÍNICO">CLÍNICO</option>
          <option value="ORTODÔNTICO">ORTODÔNTICO</option>
        </select>
        <input id="cpf" placeholder="CPF">
        <input id="telefone" placeholder="Telefone (ex: 77999999999)">

        <button type="submit" class="save">Salvar</button>
      </form>

    </div>

  </div>

</main>

<footer class="footer">
  <button onclick="sair()">SAIR</button>
</footer>

<!-- MODAL CUSTOMIZADO -->
<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-message" id="modal-message"></div>
    <div class="modal-buttons" id="modal-buttons"></div>
  </div>
</div>

<script>
  // ===== FUNÇÕES DE MODAL =====
  const modalElement = document.getElementById('modal');

  function showModal(title, message, type = 'info', buttons = []) {
    const modal = document.getElementById('modal');
    const iconEl = document.getElementById('modal-icon');
    const titleEl = document.getElementById('modal-title');
    const messageEl = document.getElementById('modal-message');
    const buttonsEl = document.getElementById('modal-buttons');

    // Definir ícone e classe baseado no tipo
    const icons = {
      success: '✓',
      error: '✕',
      warning: '⚠',
      info: 'ℹ',
      confirm: '?'
    };

    modal.className = 'modal-overlay active modal-' + type;
    iconEl.textContent = icons[type] || icons.info;
    titleEl.textContent = title;
    messageEl.textContent = message;
    
    // Limpar botões antigos
    buttonsEl.innerHTML = '';

    // Adicionar botões
    buttons.forEach(btn => {
      const button = document.createElement('button');
      button.className = 'modal-btn ' + (btn.className || 'modal-btn-secondary');
      button.textContent = btn.text;
      button.onclick = () => {
        btn.action();
        modal.classList.remove('active');
      };
      buttonsEl.appendChild(button);
    });

    // Fechar ao clicar no overlay
    modal.onclick = (e) => {
      if (e.target === modal) {
        modal.classList.remove('active');
      }
    };
  }

  function showAlert(title, message, type = 'info') {
    showModal(title, message, type, [
      {
        text: 'OK',
        className: 'modal-btn-primary',
        action: () => {}
      }
    ]);
  }

  function showConfirm(title, message, onConfirm, onCancel = null) {
    showModal(title, message, 'confirm', [
      {
        text: 'Cancelar',
        className: 'modal-btn-secondary',
        action: onCancel || (() => {})
      },
      {
        text: 'Confirmar',
        className: 'modal-btn-danger',
        action: onConfirm
      }
    ]);
  }

  // ===== FUNÇÕES PRINCIPAIS =====
  // Funções de navegação
  function irParaInicio() {
    window.location.href = '../../Tela/index.html';
  }

  function sair() {
    showConfirm(
      'Sair do Sistema',
      'Tem certeza que deseja sair? Qualquer dados não salvos serão perdidos.',
      () => {
        window.location.href = '../../Tela/index.html';
      }
    );
  }

  const formDentista = document.getElementById('form-dentista');
  const tbody = document.querySelector('table tbody');
  let cpfEmEdicao = null; // Armazena o CPF em edição

  function renderizarDentistas(dentistas) {
    tbody.innerHTML = '';

    if (dentistas.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Dentista não encontrado</td></tr>';
      return;
    }

    dentistas.forEach(dentista => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${dentista.nome || '-'}</td>
        <td>${dentista.CRO || '-'} - ${dentista.croUF || '-'}</td>
        <td>${dentista.especialidade || '-'}</td>
        <td>${dentista.CPF_Dentista || '-'}</td>
        <td>${dentista.telefone || '-'}</td>
        <td>
          <button class="edit" data-cpf="${dentista.CPF_Dentista}">Editar</button>
          <button class="delete" data-cpf="${dentista.CPF_Dentista}">Excluir</button>
        </td>
      `;
      tbody.appendChild(tr);

      tr.querySelector('.edit').addEventListener('click', () => editarDentista(dentista));
      tr.querySelector('.delete').addEventListener('click', () => excluirDentista(dentista.CPF_Dentista));
    });
  }

  // 1. Função que BUSCA e DESENHA a tabela (GET)
  async function carregarDentistas() {
    try {
      const resposta = await fetch('http://localhost:3001/dentistas');
      const dentistas = await resposta.json();

      renderizarDentistas(dentistas);
    } catch (erro) {
      console.error('Erro ao carregar tabela:', erro);
      showAlert('Erro', 'Erro ao carregar dentistas', 'error');
    }
  }

  // Chama a função assim que a página termina de carregar
  carregarDentistas();

  // 2. Função para EDITAR dentista
  function editarDentista(dentista) {
    document.getElementById('nome').value = dentista.nome;
    document.getElementById('cro').value = dentista.CRO;
    document.getElementById('uf').value = dentista.croUF;
    document.getElementById('especialidade').value = dentista.especialidade;
    document.getElementById('cpf').value = dentista.CPF_Dentista;
    document.getElementById('telefone').value = dentista.telefone || '';
    
    cpfEmEdicao = dentista.CPF_Dentista;
    
    // Muda o botão e título
    document.querySelector('.save').textContent = 'Atualizar';
    document.querySelectorAll('.tabs button')[1].classList.add('active');
    document.querySelectorAll('.tabs button')[0].classList.remove('active');
    
    // Scroll para o formulário
    document.querySelector('.form-box').scrollIntoView({ behavior: 'smooth' });
  }

  // 3. Função para EXCLUIR dentista
  async function excluirDentista(cpf) {
    showConfirm(
      'Excluir Dentista',
      'Tem certeza que deseja excluir este dentista? Esta ação não pode ser desfeita.',
      async () => {
        try {
          const resposta = await fetch(`http://localhost:3001/dentistas/${cpf}`, {
            method: 'DELETE',
            headers: {
              'Content-Type': 'application/json'
            }
          });

          const resultado = await resposta.json();

          if (resposta.ok) {
            showAlert('Sucesso!', resultado.mensagem, 'success');
            carregarDentistas();
          } else {
            showAlert('Erro', resultado.erro, 'error');
          }
        } catch (erro) {
          console.error(erro);
          showAlert('Erro', 'Erro ao excluir dentista', 'error');
        }
      }
    );
  }

  // 4. Função que SALVA ou ATUALIZA o dentista (POST ou PUT)
  formDentista.addEventListener('submit', async (evento) => {
    evento.preventDefault();

    const dados = {
      nome: document.getElementById('nome').value.trim(),
      CRO: document.getElementById('cro').value.trim(),
      croUF: document.getElementById('uf').value.trim(),
      especialidade: document.getElementById('especialidade').value.trim(),
      CPF_Dentista: document.getElementById('cpf').value.trim(),
      telefone: document.getElementById('telefone').value.trim() || null
    };

    const croPattern = /^\d{5}$/;
    const ufPattern = /^[A-Za-z]{2}$/;
    const especialidadeValida = ['CLÍNICO', 'ORTODÔNTICO'];

    if (!dados.CRO || !croPattern.test(dados.CRO)) {
      showAlert('Aviso', 'Informe o CRO com exatamente 5 números, ex: 12345', 'warning');
      return;
    }

    if (!dados.croUF || !ufPattern.test(dados.croUF)) {
      showAlert('Aviso', 'Informe a UF do CRO com duas letras, ex: SP', 'warning');
      return;
    }

    if (!especialidadeValida.includes(dados.especialidade.toUpperCase())) {
      showAlert('Aviso', 'Escolha a especialidade CLÍNICO ou ORTODÔNTICO', 'warning');
      return;
    }

    dados.croUF = dados.croUF.toUpperCase();
    dados.especialidade = dados.especialidade.toUpperCase();

    try {
      let url = 'http://localhost:3001/dentistas';
      let metodo = 'POST';

      // Se está editando, usa PUT
      if (cpfEmEdicao) {
        url = `http://localhost:3001/dentistas/${cpfEmEdicao}`;
        metodo = 'PUT';
      }

      const resposta = await fetch(url, {
        method: metodo,
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(dados)
      });

      const resultado = await resposta.json();

      if (resposta.ok) {
        const mensagemSucesso = resultado.mensagem || (cpfEmEdicao ? 'Dados atualizados com sucesso' : 'Cadastro realizado com sucesso');
        showAlert('Sucesso!', mensagemSucesso, 'success');
        formDentista.reset();
        cpfEmEdicao = null;
        
        // Restaura o botão e os tabs
        document.querySelector('.save').textContent = 'Salvar';
        document.querySelectorAll('.tabs button')[0].classList.add('active');
        document.querySelectorAll('.tabs button')[1].classList.remove('active');
        
        carregarDentistas();
      } else {
        showAlert('Aviso', resultado.erro, 'warning');
      }
    } catch (erro) {
      console.error(erro);
      showAlert('Erro', 'O backend não respondeu.', 'error');
    }
  });

  // 5. Botão para limpar formulário e voltar ao cadastro
  document.querySelectorAll('.tabs button')[0].addEventListener('click', () => {
    formDentista.reset();
    cpfEmEdicao = null;
    document.querySelector('.save').textContent = 'Salvar';
    document.querySelectorAll('.tabs button')[0].classList.add('active');
    document.querySelectorAll('.tabs button')[1].classList.remove('active');
  });

  // 6. Função para BUSCAR dentistas
  const buscaInput = document.getElementById('busca-input');
  const buscaBtn = document.getElementById('busca-btn');

  buscaBtn.addEventListener('click', async () => {
    const termoBusca = buscaInput.value.trim();

    if (!termoBusca) {
      showAlert('Campo vazio', 'Digite algo para buscar', 'warning');
      return;
    }

    try {
      const resposta = await fetch('http://localhost:3001/dentistas');
      const dentistas = await resposta.json();

      // Filtra os dentistas baseado na busca
      const dentistasEncontrados = dentistas.filter(dentista => 
        (dentista.nome || '').toLowerCase().includes(termoBusca.toLowerCase()) ||
        (dentista.CRO || '').toLowerCase().includes(termoBusca.toLowerCase()) ||
        (dentista.telefone || '').toLowerCase().includes(termoBusca.toLowerCase()) ||
        (dentista.especialidade || '').toLowerCase().includes(termoBusca.toLowerCase())
      );

      renderizarDentistas(dentistasEncontrados);
    } catch (erro) {
      console.error('Erro ao buscar:', erro);
      showAlert('Erro', 'Erro ao buscar dentistas', 'error');
    }
  });

  // Permite buscar pressionando Enter
  buscaInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      buscaBtn.click();
    }
  });

  // Botão para limpar busca e listar todos novamente
  const botaoLimparBusca = document.createElement('button');
  botaoLimparBusca.textContent = 'Limpar Busca';
  botaoLimparBusca.style.marginLeft = '10px';
  botaoLimparBusca.addEventListener('click', () => {
    buscaInput.value = '';
    carregarDentistas();
  });
  document.querySelector('.search-bar').appendChild(botaoLimparBusca);</script>
</body>
</html>
