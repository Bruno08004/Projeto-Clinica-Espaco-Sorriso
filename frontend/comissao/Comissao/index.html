<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Comissões</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../global.css">
</head>
<body>
<header class="topbar">
  <div class="logo">
    <img src="../../assests/logo.png" alt="Espaço Sorriso">
  </div>
  <h1>Espaço Sorriso - Sistema de Gestão</h1>
  <nav>
    <a href="javascript:irParaInicio()">Início</a>
    <a href="#">Relatórios</a>
    <a href="#">Configurações</a>
    <a href="javascript:sair()">Sair</a>
  </nav>
  <div class="profile">👤</div>
</header>

<main class="container">
  <div class="title">
    <h2>Gerenciamento de Comissão</h2>
    <p>Consulte e ajuste comissões de dentistas por item de atendimento.</p>
  </div>

  <div class="search-bar">
    <input id="busca-input" type="text" placeholder="Buscar por dentista, CPF, atendimento ou procedimento...">
    <button id="busca-btn">Pesquisar</button>
  </div>

  <div class="content">
    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>Atendimento</th>
            <th>Procedimento</th>
            <th>Dentista</th>
            <th>Valor Item</th>
            <th>Desconto</th>
            <th>Comissão</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="form-box">
      <div class="tabs">
        <button class="active" type="button">Registrar Comissão</button>
        <button type="button">Editar Comissão</button>
      </div>

      <form id="form-comissao">
        <input id="id-atendimento" type="number" min="1" placeholder="ID do atendimento*">
        <input id="id-procedimento" type="number" min="1" placeholder="ID do procedimento*">
        <input id="cpf-dentista" placeholder="CPF do dentista*">
        <input id="qtd" type="number" min="1" placeholder="Quantidade*">
        <input id="valor-unit" type="number" min="0" step="0.01" placeholder="Valor unitário*">
        <input id="desconto-item" type="number" min="0" step="0.01" placeholder="Desconto do item">
        <input id="comissao-dentista" type="number" min="0" step="0.01" placeholder="Comissão do dentista*">

        <button type="submit" class="save">Salvar</button>
      </form>
    </div>
  </div>
</main>

<footer class="footer">
  <button onclick="sair()">SAIR</button>
</footer>

<div id="modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-message" id="modal-message"></div>
    <div class="modal-buttons" id="modal-buttons"></div>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:3000/comissoes';
  const tbody = document.querySelector('table tbody');
  const formComissao = document.getElementById('form-comissao');
  let chaveEmEdicao = null;
  let comissoesCache = [];

  function showModal(title, message, type = 'info', buttons = []) {
    const modal = document.getElementById('modal');
    const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ', confirm: '?' };
    document.getElementById('modal-icon').textContent = icons[type] || icons.info;
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-message').textContent = message;
    const buttonsEl = document.getElementById('modal-buttons');
    buttonsEl.innerHTML = '';
    buttons.forEach(btn => {
      const button = document.createElement('button');
      button.className = 'modal-btn ' + (btn.className || 'modal-btn-secondary');
      button.textContent = btn.text;
      button.onclick = () => {
        btn.action();
        modal.classList.remove('active');
      };
      buttonsEl.appendChild(button);
    });
    modal.className = 'modal-overlay active modal-' + type;
    modal.onclick = event => {
      if (event.target === modal) modal.classList.remove('active');
    };
  }

  function showAlert(title, message, type = 'info') {
    showModal(title, message, type, [{ text: 'OK', className: 'modal-btn-primary', action: () => {} }]);
  }

  function showConfirm(title, message, onConfirm) {
    showModal(title, message, 'confirm', [
      { text: 'Cancelar', className: 'modal-btn-secondary', action: () => {} },
      { text: 'Confirmar', className: 'modal-btn-danger', action: onConfirm }
    ]);
  }

  function dinheiro(valor) {
    return Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function criarChave(comissao) {
    return `${comissao.fk_idAtendimento}-${comissao.fk_idProcedimento}`;
  }

  function renderizarComissoes(comissoes) {
    tbody.innerHTML = '';
    if (!comissoes.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Comissão não encontrada</td></tr>';
      return;
    }

    comissoes.forEach(comissao => {
      const valorItem = Number(comissao.qtd || 0) * Number(comissao.valorUnit || 0);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${comissao.fk_idAtendimento || '-'}</td>
        <td>${comissao.nomeProcedimento || comissao.fk_idProcedimento || '-'}</td>
        <td>${comissao.nomeDentista || comissao.CPF_Dentista || '-'}</td>
        <td>${dinheiro(valorItem)}</td>
        <td>${dinheiro(comissao.descontoItem)}</td>
        <td>${dinheiro(comissao.comissaoDentista)}</td>
        <td>
          <button class="edit" data-chave="${criarChave(comissao)}">Editar</button>
          <button class="delete" data-chave="${criarChave(comissao)}">Excluir</button>
        </td>
      `;
      tbody.appendChild(tr);
      tr.querySelector('.edit').addEventListener('click', () => editarComissao(comissao));
      tr.querySelector('.delete').addEventListener('click', () => excluirComissao(comissao));
    });
  }

  async function carregarComissoes() {
    try {
      const resposta = await fetch(API_URL);
      comissoesCache = await resposta.json();
      renderizarComissoes(comissoesCache);
    } catch (erro) {
      console.error('Erro ao carregar comissões:', erro);
      renderizarComissoes([]);
      showAlert('Erro', 'Erro ao carregar comissões. Verifique se a rota /comissoes está ativa.', 'error');
    }
  }

  function editarComissao(comissao) {
    chaveEmEdicao = criarChave(comissao);
    document.getElementById('id-atendimento').value = comissao.fk_idAtendimento || '';
    document.getElementById('id-procedimento').value = comissao.fk_idProcedimento || '';
    document.getElementById('cpf-dentista').value = comissao.CPF_Dentista || '';
    document.getElementById('qtd').value = comissao.qtd || '';
    document.getElementById('valor-unit').value = comissao.valorUnit || '';
    document.getElementById('desconto-item').value = comissao.descontoItem || '';
    document.getElementById('comissao-dentista').value = comissao.comissaoDentista || '';
    document.querySelector('.save').textContent = 'Atualizar';
    document.querySelectorAll('.tabs button')[0].classList.remove('active');
    document.querySelectorAll('.tabs button')[1].classList.add('active');
    document.querySelector('.form-box').scrollIntoView({ behavior: 'smooth' });
  }

  async function excluirComissao(comissao) {
    showConfirm('Excluir Comissão', 'Tem certeza que deseja excluir esta comissão?', async () => {
      try {
        const resposta = await fetch(`${API_URL}/${comissao.fk_idAtendimento}/${comissao.fk_idProcedimento}`, { method: 'DELETE' });
        const resultado = await resposta.json();
        if (resposta.ok) {
          showAlert('Sucesso!', resultado.mensagem || 'Comissão excluída com sucesso.', 'success');
          carregarComissoes();
        } else {
          showAlert('Aviso', resultado.erro || 'Não foi possível excluir a comissão.', 'warning');
        }
      } catch (erro) {
        console.error(erro);
        showAlert('Erro', 'Erro ao excluir comissão.', 'error');
      }
    });
  }

  formComissao.addEventListener('submit', async evento => {
    evento.preventDefault();
    const dados = {
      fk_idAtendimento: document.getElementById('id-atendimento').value,
      fk_idProcedimento: document.getElementById('id-procedimento').value,
      CPF_Dentista: document.getElementById('cpf-dentista').value.trim(),
      qtd: document.getElementById('qtd').value,
      valorUnit: document.getElementById('valor-unit').value,
      descontoItem: document.getElementById('desconto-item').value || 0,
      comissaoDentista: document.getElementById('comissao-dentista').value
    };

    if (!dados.fk_idAtendimento || !dados.fk_idProcedimento || !dados.CPF_Dentista || !dados.qtd || !dados.valorUnit || !dados.comissaoDentista) {
      showAlert('Aviso', 'Preencha atendimento, procedimento, dentista, quantidade, valor unitário e comissão.', 'warning');
      return;
    }

    try {
      const url = chaveEmEdicao ? `${API_URL}/${dados.fk_idAtendimento}/${dados.fk_idProcedimento}` : API_URL;
      const resposta = await fetch(url, {
        method: chaveEmEdicao ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(dados)
      });
      const resultado = await resposta.json();
      if (resposta.ok) {
        showAlert('Sucesso!', resultado.mensagem || 'Comissão salva com sucesso.', 'success');
        limparFormulario();
        carregarComissoes();
      } else {
        showAlert('Aviso', resultado.erro || 'Não foi possível salvar a comissão.', 'warning');
      }
    } catch (erro) {
      console.error(erro);
      showAlert('Erro', 'O backend não respondeu.', 'error');
    }
  });

  function limparFormulario() {
    formComissao.reset();
    chaveEmEdicao = null;
    document.querySelector('.save').textContent = 'Salvar';
    document.querySelectorAll('.tabs button')[0].classList.add('active');
    document.querySelectorAll('.tabs button')[1].classList.remove('active');
  }

  document.querySelectorAll('.tabs button')[0].addEventListener('click', limparFormulario);

  document.getElementById('busca-btn').addEventListener('click', () => {
    const termo = document.getElementById('busca-input').value.trim().toLowerCase();
    if (!termo) {
      showAlert('Campo vazio', 'Digite algo para buscar.', 'warning');
      return;
    }
    const encontrados = comissoesCache.filter(comissao =>
      String(comissao.fk_idAtendimento || '').includes(termo) ||
      String(comissao.fk_idProcedimento || '').includes(termo) ||
      (comissao.CPF_Dentista || '').includes(termo) ||
      (comissao.nomeDentista || '').toLowerCase().includes(termo) ||
      (comissao.nomeProcedimento || '').toLowerCase().includes(termo)
    );
    renderizarComissoes(encontrados);
  });

  document.getElementById('busca-input').addEventListener('keypress', event => {
    if (event.key === 'Enter') document.getElementById('busca-btn').click();
  });

  const botaoLimparBusca = document.createElement('button');
  botaoLimparBusca.textContent = 'Limpar Busca';
  botaoLimparBusca.style.marginLeft = '10px';
  botaoLimparBusca.addEventListener('click', () => {
    document.getElementById('busca-input').value = '';
    renderizarComissoes(comissoesCache);
  });
  document.querySelector('.search-bar').appendChild(botaoLimparBusca);

  function irParaInicio() {
    window.location.href = '../../Tela/index.html';
  }

  function sair() {
    showConfirm('Sair do Sistema', 'Tem certeza que deseja sair?', () => {
      window.location.href = '../../Tela/index.html';
    });
  }

  carregarComissoes();
</script>
</body>
</html>
